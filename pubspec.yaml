name: laporan_in
description: Aplikasi pelaporan kerusakan fasilitas umum

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  supabase_flutter: ^2.3.0
  image_picker: ^1.0.7
  intl: ^0.19.0
  provider: ^6.1.1
  uuid: ^4.3.3
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  
